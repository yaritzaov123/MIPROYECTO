<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería Premium de Mole Negro Tradicional</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --fondo-oscuro: #0f0a05; /* Tono chocolate profundo */
            --dorado-maiz: #d4a373;  /* Tono ajonjolí y maíz tostado */
            --rojo-chile: #a1251b;   /* Tono chile ancho/guajillo */
            --blanco-crema: #fdf6ee; /* Fondo suave para textos */
            --sombra-suave: rgba(0, 0, 0, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle at center, #1a120b 0%, var(--fondo-oscuro) 100%);
            color: var(--blanco-crema);
            font-family: 'Montserrat', sans-serif;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            max-width: 800px;
        }

        header h1 {
            font-family: 'Cinzel', serif;
            color: var(--dorado-maiz);
            font-size: 2.8rem;
            letter-spacing: 3px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            margin-bottom: 15px;
        }

        header p {
            font-size: 1.1rem;
            color: #c4b5a7;
            line-height: 1.6;
            font-weight: 300;
        }

        /* Separador Artesanal Mexicano */
        .separador {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
            width: 100%;
            max-width: 300px;
        }

        .linea {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--dorado-maiz), transparent);
        }

        .rombo {
            width: 100%;
            max-width: 10px;
            height: 10px;
            background-color: var(--rojo-chile);
            transform: rotate(45deg);
            margin: 0 15px;
            border: 1px solid var(--dorado-maiz);
        }

        /* Contenedor Principal de la Galería 4x3 */
        .galeria-contenedor {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            max-width: 1200px;
            width: 100%;
            margin-bottom: 60px;
        }

        /* Tarjeta de Imagen Individual */
        .galeria-item {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            border: 1px solid #2d1e11;
            aspect-ratio: 4 / 3;
            box-shadow: 0 10px 25px var(--sombra-suave);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            background-color: #160f08;
        }

        .galeria-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
            filter: brightness(0.9);
        }

        /* Efectos Hover */
        .galeria-item:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--dorado-maiz);
            box-shadow: 0 15px 35px rgba(212, 163, 115, 0.2);
        }

        .galeria-item:hover img {
            transform: scale(1.1);
            filter: brightness(1.1);
        }

        /* Capa de Información Deslizable */
        .capa-informacion {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(15,10,5,1) 0%, rgba(15,10,5,0.7) 70%, transparent 100%);
            padding: 20px 15px 15px 15px;
            transform: translateY(100%);
            transition: transform 0.35s ease-out;
        }

        .galeria-item:hover .capa-informacion {
            transform: translateY(0);
        }

        .capa-informacion h3 {
            color: var(--dorado-maiz);
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* Botón de Enlace a WhatsApp */
        .btn-contacto-wa {
            display: inline-flex;
            align-items: center;
            background-color: #25D366;
            color: #ffffff;
            text-decoration: none;
            padding: 16px 40px;
            font-weight: 700;
            font-size: 1.15rem;
            border-radius: 50px;
            box-shadow: 0 8px 25px rgba(953 115 6044);
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            margin-bottom: 50px;
        }

        .btn-contacto-wa:hover {
            background-color: #1ebd58;
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(37, 211, 102, 0.5);
        }

        .btn-contacto-wa svg {
            width: 26px;
            height: 26px;
            margin-right: 12px;
            fill: currentColor;
        }

        /* Pie de Página Elegante */
        footer {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #2d1e11;
            width: 100%;
            max-width: 600px;
            color: #706053;
            font-size: 0.9rem;
        }

        /* Responsive: Tablets y Pantallas Medianas */
        @media (max-width: 1024px) {
            .galeria-contenedor {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
        }

        /* Responsive: Dispositivos Móviles */
        @media (max-width: 600px) {
            .galeria-contenedor {
                grid-template-columns: 1fr;
            }
            header h1 {
                font-size: 2rem;
            }
            body {
                padding: 20px 15px;
            }
        }
    </style>
</head>
